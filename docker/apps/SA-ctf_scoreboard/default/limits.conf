# This stock Splunk 10.4 image has no [structured_data_service] stanza
# anywhere (confirmed via `splunk btool limits list structured_data_service`
# -- empty). Splunk Web's own classic-dashboard JS (dashboard_1.1.js)
# unconditionally probes /services/configs/conf-limits/structured_data_service
# while setting up each panel's search manager; the 404 that follows isn't
# handled gracefully and surfaces as "Cannot read properties of undefined
# (reading 'forEach')" in dashboard_1.1.js, which Splunk Web then reports as
# the generic "A custom JavaScript error caused an issue loading your
# dashboard" banner. Declaring the stanza (even empty, defaults apply) makes
# the config endpoint return 200 instead of 404.
[structured_data_service]
