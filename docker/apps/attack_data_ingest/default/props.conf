# Parsing + search-time config for splunk/attack_data malware datasets.
#
# attack_data's own metadata (datasets/malware/<family>/<scenario>/*.yml)
# sets sourcetype to a bare channel family ("XmlWinEventLog" for every
# Windows Event Log channel — Sysmon, Security, PowerShell-Operational,
# System, ...; "sysmon:linux" for Linux Sysmon) and carries the specific
# channel in `source` instead (e.g.
# "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"). That's the
# opposite convention from the BOTS archives (which bake the channel into
# sourcetype itself — see bots_sysmon_extractions/).
#
# Everything below keys on sourcetype, not source: setup.sh's oneshot
# ingest sets sourcetype up front but applies the specific channel via
# `rename-source` later in the pipeline, so a source::-keyed stanza is
# unreliable here for BOTH parse-time settings (confirmed: SHOULD_LINEMERGE
# silently didn't apply) and, empirically, search-time EXTRACT too. The
# field layout (<EventID>, <Data Name='...'>) is identical across every
# Windows Event Log channel anyway, so per-channel stanzas add nothing.
#
# Without a LINE_BREAKER, every file here silently collapsed into ONE
# giant multi-event blob. Most of this dataset is one-event-per-line XML
# (<Event ...>...</Event>), which just needs SHOULD_LINEMERGE=false — but
# a few files (e.g. malware/olympic_destroyer/system.log) are the OLDER
# legacy `Get-WinEvent`-style export: multi-line "Key=Value" blocks, each
# new event starting with an "MM/DD/YYYY HH:MM:SS AM/PM" line, no
# per-event delimiter otherwise. A blanket SHOULD_LINEMERGE=false shreds
# THAT format into one bogus one-field event per line instead. The
# LINE_BREAKER regex below only breaks a newline into a new event when
# it's immediately followed by either pattern, so both formats parse
# correctly under the same sourcetype.
#
# EventCode is lifted from <EventID> (XML) — the legacy format's own
# "EventCode=N" lines get picked up by Splunk's default AUTO_KV, no extra
# rule needed. REPORT-attackdata_eventdata pulls Image/CommandLine/
# ParentImage/User/etc. out of the XML <Data Name='...'> elements.

[XmlWinEventLog]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)(?=<Event |\d{2}/\d{2}/\d{4}\s+\d{1,2}:\d{2}:\d{2}\s+[AP]M)
EXTRACT-winevt_eventcode = <EventID>(?<EventCode>\d+)</EventID>
EXTRACT-winevt_computer  = <Computer>(?<Computer>[^<]+)</Computer>
REPORT-attackdata_eventdata = attackdata_xml_eventdata

[sysmon:linux]
SHOULD_LINEMERGE = false
EXTRACT-sysmon_eventcode = <EventID>(?<EventCode>\d+)</EventID>
EXTRACT-sysmon_computer  = <Computer>(?<Computer>[^<]+)</Computer>
REPORT-attackdata_eventdata = attackdata_xml_eventdata
