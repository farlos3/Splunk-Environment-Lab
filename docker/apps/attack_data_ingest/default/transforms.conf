# Dynamic field extraction for Windows/Linux Sysmon-style XML EventData.
#
# Each event carries its payload as repeated elements of the form
#   <Data Name='Image'>C:\...\foo.exe</Data>       (Windows channels)
#   <Data Name="Image">/usr/bin/foo</Data>          (Linux Sysmon)
# Quote style differs by platform, hence the character class instead of
# a literal quote. FORMAT = $1::$2 turns the Name attribute into the
# field name and the element text into the value, applied repeatedly
# across every <Data> in the event.
[attackdata_xml_eventdata]
REGEX = <Data Name=['"]([^'"]+)['"]>([^<]*)</Data>
FORMAT = $1::$2
MV_ADD = true
