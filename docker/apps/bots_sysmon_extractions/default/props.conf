# Search-time extractions for BOTS Sysmon data.
#
# Two stanzas because the BOTSv1 archive indexed Sysmon under two
# different sourcetype casings:
#   XmlWinEventLog:Microsoft-Windows-Sysmon/Operational   (most hosts)
#   xmlwineventlog:microsoft-windows-sysmon/operational   (e.g. we8105desk)
# props.conf stanza matching is case-sensitive, so both are listed.
#
# EventCode is lifted from the XML <EventID> tag so queries can use the
# same field name as classic WinEventLog (e.g. EventCode=1 = process
# creation). REPORT-sysmon_eventdata pulls Image/CommandLine/ParentImage/
# User/etc. out of the <Data Name='...'> elements.

[XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
EXTRACT-sysmon_eventcode = <EventID>(?<EventCode>\d+)</EventID>
EXTRACT-sysmon_computer  = <Computer>(?<Computer>[^<]+)</Computer>
REPORT-sysmon_eventdata  = sysmon_xml_eventdata

[xmlwineventlog:microsoft-windows-sysmon/operational]
EXTRACT-sysmon_eventcode = <EventID>(?<EventCode>\d+)</EventID>
EXTRACT-sysmon_computer  = <Computer>(?<Computer>[^<]+)</Computer>
REPORT-sysmon_eventdata  = sysmon_xml_eventdata
