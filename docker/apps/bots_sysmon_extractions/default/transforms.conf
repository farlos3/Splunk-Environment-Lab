# Dynamic field extraction for Sysmon XML EventData.
#
# Each Sysmon event carries its payload as repeated elements of the form
#   <Data Name='Image'>C:\...\foo.exe</Data>
#   <Data Name='CommandLine'>foo.exe -bar</Data>
# Splunk's stock install has no parser for this (that normally ships in
# Splunk_TA_windows, which this lab does not install). FORMAT = $1::$2
# turns the Name attribute into the field name and the element text into
# the value, applied repeatedly across every <Data> in the event.
[sysmon_xml_eventdata]
REGEX = <Data Name='([^']+)'>([^<]*)</Data>
FORMAT = $1::$2
MV_ADD = true
