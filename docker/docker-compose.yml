name: splunklab

services:
  splunk:
    image: splunk/splunk:latest
    # Splunk publishes amd64 images only. On Apple Silicon (M1/M2/M3/M4)
    # this forces Docker Desktop to run via Rosetta 2 emulation; on
    # Windows/Linux x86 it's a no-op.
    platform: linux/amd64
    container_name: splunk-lab
    hostname: splunk-lab
    environment:
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=p@ssw0rd
      - SPLUNK_HEC_TOKEN=lab-hec-token-CHANGE-ME
    ports:
      - "8000:8000"      # Web UI
      - "8088:8088"      # HTTP Event Collector
      - "8089:8089"      # Management API
      - "9997:9997"      # Forwarder receiver
      - "1514:1514/tcp"  # Syslog TCP (non-privileged port)
      - "1514:1514/udp"  # Syslog UDP
    volumes:
      # BOTS datasets — each lives in its own named Docker volume, NOT a
      # bind mount. Splunk's validatedb refuses Windows-host bind mounts
      # ("unusable filesystem") because Docker Desktop's gRPC-FUSE share
      # doesn't support the file locking / mmap semantics Splunk
      # requires. The named volumes sit on Docker's native ext4 and work
      # fine. Each is populated by setup.sh from ../bots-data/bots<vN>/
      # on first run. The mount targets MUST be `bots<vN>_data_set`
      # because each archive's indexes.conf hardcodes that app name in
      # its bucket paths. An empty volume = empty app dir, which Splunk
      # simply ignores — so unused versions are harmless.
      - splunk-botsv1:/opt/splunk/etc/apps/botsv1_data_set
      - splunk-botsv2:/opt/splunk/etc/apps/botsv2_data_set
      - splunk-botsv3:/opt/splunk/etc/apps/botsv3_data_set
      # Search-time Sysmon XML field extractions (EventCode, Image,
      # CommandLine, ...). The BOTS archives ship the raw XML but no
      # parser, since Splunk_TA_windows isn't installed. Bind mount from
      # the repo so it's version-controlled and survives container
      # recreation (config bind mounts are fine — only index bucket bind
      # mounts trip validatedb). NOT read-only: the image's ansible
      # entrypoint runs `chown -R` over /opt/splunk/etc/apps on every
      # boot, which fails hard (EROFS) against a :ro mount.
      - ./apps/bots_sysmon_extractions:/opt/splunk/etc/apps/bots_sysmon_extractions
      # CTF scoreboard (splunk/SA-ctf_scoreboard + companion _admin app). Folder
      # names are load-bearing: scoreboard_controller.py hardcodes the literal
      # app names 'SA-ctf_scoreboard' / 'SA-ctf_scoreboard_admin' in KV store
      # REST paths and its own config-file path — renaming either folder breaks
      # the app. setup.sh provisions scoreboard_controller.config and imports
      # question/answer/hint CSVs from ctf_seed_data/ after the container is up.
      - ./apps/SA-ctf_scoreboard:/opt/splunk/etc/apps/SA-ctf_scoreboard
      - ./apps/SA-ctf_scoreboard_admin:/opt/splunk/etc/apps/SA-ctf_scoreboard_admin
      # attack_data micro-CTF: index definition + XML field extractions,
      # plus the raw malware log files ingested via `splunk add oneshot`
      # at setup time. NOT read-only even though it's outside etc/apps —
      # a :ro mount here hung the ansible entrypoint's chown pass instead
      # of cleanly EROFS-ing (unlike etc/apps, its actual scope is wider
      # than the comment above implies — learned the hard way).
      - ./apps/attack_data_ingest:/opt/splunk/etc/apps/attack_data_ingest
      - ../attack-data:/opt/splunk/attack_data_seed
      # Persistent state — survives `docker compose restart`, killed by `down -v`.
      - splunk-var:/opt/splunk/var
      - splunk-etc-users:/opt/splunk/etc/users
    restart: unless-stopped
    healthcheck:
      # -u is required: unauthenticated /services/server/info now 401s on this
      # image, which made `curl -f` (no -u) treat every check as a failure and
      # the container as permanently "unhealthy" even once splunkd was fine.
      test: ["CMD-SHELL", "curl -fks -u admin:$$SPLUNK_PASSWORD https://localhost:8089/services/server/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  splunk-var:
  splunk-etc-users:
  splunk-botsv1:
  splunk-botsv2:
  splunk-botsv3:
